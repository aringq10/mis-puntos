startup_session ~/.config/kitty/sessions/a.kitty-session

tab_title_template "[{layout_name}] {title}"

enabled_layouts splits

# WINDOWS
    map alt+ctrl+l launch --location=vsplit --cwd=current
    map alt+ctrl+j launch --location=hsplit --cwd=current
    map alt+w close_window

    # Move the active window in the indicated direction
    map alt+shift+h move_window left
    map alt+shift+l move_window right
    map alt+shift+k move_window up
    map alt+shift+j move_window down

    # Switch focus to the neighboring window in the indicated direction
    map alt+h neighboring_window left
    map alt+l neighboring_window right
    map alt+k neighboring_window up
    map alt+j neighboring_window down

# Tabs
    map ctrl+shift+t new_tab_with_cwd
    map alt+1 goto_tab 1
    map alt+2 goto_tab 2
    map alt+3 goto_tab 3
    map alt+4 goto_tab 4
    map alt+5 goto_tab 5
    map alt+6 goto_tab 6
    map alt+7 goto_tab 7
    map alt+8 goto_tab 8
    map alt+9 goto_tab 9
    map alt+n previous_tab
    map alt+m next_tab

# CURSOR
    cursor_shape block
    shell_integration no-cursor
    cursor_blink_interval 0
    cursor_trail 1

# SCROLL
    scrollbar_width 1
    scrollbar_hitbox_expansion 1
    touch_scroll_multiplier 7.5

# TAB BAR
    tab_bar_style powerline
    tab_bar_edge top
    tab_bar_align left

# FONT
    font_size 13.0
    # BEGIN_KITTY_FONTS
    font_family      family="0xProto Nerd Font Mono"
    bold_font        auto
    italic_font      auto
    bold_italic_font auto
    # END_KITTY_FONTS

# COLOR THEME
    # BEGIN_KITTY_THEME
    # Tokyo Night
    include current-theme.conf
    # END_KITTY_THEME
    background_opacity 0.95
